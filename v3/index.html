<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BentoBoxDS | The Sovereign Vessel Interface</title>
    <link rel="stylesheet" href="css/main.css">
    <script type="module" src="js/components/HeliClock.js" defer></script>
    <script type="module" src="js/components/ResonancePulse.js" defer></script>
    <script type="module" src="js/components/BentoQuadrant.js" defer></script>
    <script type="module" src="js/components/InterplayNucleus.js" defer></script>
    <script type="module" src="js/components/PhaseHeader.js" defer></script>
    <script type="module" src="js/app.js" defer></script>
</head>
<body class="boreal-aesthetic">
    <header class="vessel-header">
        <div class="logo-container" onclick="location.hash=''" style="cursor: pointer;">
            <span class="logo-text">BentoBox Logo</span>
            <span class="badge">HOP v1.0 Experimental</span>
        </div>
        <div class="header-controls">
            <nav class="header-nav">
                <a href="#about" class="nav-link">Sanctuary</a>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <svg id="sun-icon" class="hidden" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                <svg id="moon-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
        </div>
    </header>
    
    <phase-header id="prime-directive"></phase-header>

    <main id="app-hub" class="quadrant-matrix">
        <!-- The Four Quadrants -->
        <bento-quadrant id="now-me" type="tl" title="Now Me" subtitle="Story / Context"></bento-quadrant>
        <bento-quadrant id="future-me" type="tr" title="Future Me" subtitle="Emulation / Goal"></bento-quadrant>
        <bento-quadrant id="now-us" type="bl" title="Now Us" subtitle="Peer Network / Resilience"></bento-quadrant>
        <bento-quadrant id="future-us" type="br" title="Future Us" subtitle="Collective Longevity / Bioregional"></bento-quadrant>

        <!-- The Nucleus (Interplay) -->
        <interplay-nucleus id="nucleus"></interplay-nucleus>
    </main>

    <div id="lens-overlay" class="lens-container">
        <!-- Lens Content will be injected here -->
        <div id="lens-content"></div>
    </div>

    <footer class="vessel-footer">
        <nav id="instrument-nav" class="rollout-nav">
            <div class="instrument-trigger" onclick="location.hash='instruments/heliclock'">
                <span class="inst-icon">H</span>
                <span class="inst-label">HeliClock</span>
            </div>
            <div class="instrument-trigger" onclick="location.hash='instruments/life-strap'">
                <span class="inst-icon">L</span>
                <span class="inst-label">Life-Strap</span>
            </div>
            <div class="instrument-trigger" onclick="location.hash='instruments/resonance-pulse'">
                <span class="inst-icon">R</span>
                <span class="inst-label">Resonance</span>
            </div>
            <div class="instrument-trigger" onclick="location.hash='instruments/besearch'">
                <span class="inst-icon">B</span>
                <span class="inst-label">Besearch</span>
            </div>
            <div class="instrument-trigger" onclick="location.hash='instruments/beebee'">
                <span class="inst-icon">D</span>
                <span class="inst-label">Dialogue</span>
            </div>
            <div class="instrument-trigger" onclick="location.hash='instruments/hop-security'">
                <span class="inst-icon">P</span>
                <span class="inst-label">Privacy</span>
            </div>
        </nav>
    </footer>
</body>
</html>
